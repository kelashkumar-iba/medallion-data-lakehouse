# ── Shared config block reused by all Airflow services ─────────────────────
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # MinIO connection — injected into every Airflow container
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_BUCKET: lakehouse
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./transforms:/opt/airflow/transforms
    - ./quality:/opt/airflow/quality
    - ./great_expectations:/opt/airflow/great_expectations
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ── MinIO: S3-compatible object storage ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lakehouse_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── minio-init: create the lakehouse bucket ─────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/lakehouse;
        echo 'Bucket lakehouse is ready';
      "

  # ── PostgreSQL: Airflow metadata DB ─────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: lakehouse_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── airflow-init: DB migrations + admin user ────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: lakehouse_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir -r /requirements.txt
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Kelash \
          --lastname IBA \
          --role Admin \
          --email kelash.iba22@gmail.com \
          --password admin
        echo "Airflow init complete"
    environment:
      <<: *airflow-common-env

  # ── Airflow webserver (installs deps on start, then runs webserver) ─────
  airflow-webserver:
    <<: *airflow-common
    container_name: lakehouse_airflow_webserver
    command: bash -c "pip install --no-cache-dir -r /requirements.txt && exec airflow webserver"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler (installs deps on start, then runs scheduler) ─────
  airflow-scheduler:
    <<: *airflow-common
    container_name: lakehouse_airflow_scheduler
    command: bash -c "pip install --no-cache-dir -r /requirements.txt && exec airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  minio_data:
  postgres_data:
